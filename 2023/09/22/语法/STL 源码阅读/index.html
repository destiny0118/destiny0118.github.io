    <div class="post-body" itemprop="articleBody"><h1 id="priority-queue-heap"><a href="#priority-queue-heap" class="headerlink" title="priority_queue(heap)"></a>priority_queue(heap)</h1><h3 id="push"><a href="#push" class="headerlink" title="push"></a>push</h3><figure class="highlight c++"><table><tr><td class="code"><pre><span class="line"> <span class="keyword">template</span>&lt;<span class="keyword">typename</span> _RandomAccessIterator, <span class="keyword">typename</span> _Distance, <span class="keyword">typename</span> _Tp,</span><br><span class="line">   <span class="keyword">typename</span> _Compare&gt;</span><br><span class="line">   <span class="type">void</span></span><br><span class="line">   __push_heap(_RandomAccessIterator __first,</span><br><span class="line">	_Distance __holeIndex, _Distance __topIndex, _Tp __value,</span><br><span class="line">	_Compare&amp; __comp)</span><br><span class="line"><span class="comment">//首迭代器,插入值索引(__last-1),堆顶索引(0),插入值,比较函数</span></span><br><span class="line">   &#123;</span><br><span class="line">     _Distance __parent = (__holeIndex - <span class="number">1</span>) / <span class="number">2</span>;</span><br><span class="line">     <span class="comment">//父节点值与节点值比较，默认less，父节点小，则交换</span></span><br><span class="line">     <span class="keyword">while</span> (__holeIndex &gt; __topIndex &amp;&amp; __comp(__first + __parent, __value))</span><br><span class="line">&#123;</span><br><span class="line">  *(__first + __holeIndex) = _GLIBCXX_MOVE(*(__first + __parent));</span><br><span class="line">  __holeIndex = __parent;</span><br><span class="line">  __parent = (__holeIndex - <span class="number">1</span>) / <span class="number">2</span>;</span><br><span class="line">&#125;</span><br><span class="line">     *(__first + __holeIndex) = _GLIBCXX_MOVE(__value);</span><br><span class="line">   &#125;</span><br></pre></td></tr></table></figure>
